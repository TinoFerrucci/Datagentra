services:

  # ── Database initialisation ───────────────────────────────────────────────────
  # Runs once: seeds datagentra.db if it does not exist yet.
  db-init:
    image: python:3.12-slim
    container_name: datagentra_db_init
    environment:
      SQLITE_DB_PATH: /db/datagentra.db
    volumes:
      - ./db:/db
    command: python /db/seed_sqlite.py
    restart: "no"

  # ── FastAPI backend ───────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: datagentra_backend
    env_file:
      - ./backend/.env
    # Override DB paths to the correct absolute paths inside the container
    environment:
      SQLITE_DB_PATH: /app/db/datagentra.db
      CONVERSATIONS_DB_PATH: /app/db/conversations.db
    ports:
      - "8000:8000"
    volumes:
      - ./db:/app/db
    depends_on:
      db-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    restart: unless-stopped

  # ── React + Vite frontend ────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: datagentra_frontend
    env_file:
      - ./frontend/.env
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
